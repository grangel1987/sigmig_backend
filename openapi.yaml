openapi: 3.0.0
info:
  title: API Backend SIGMI
  version: '1.0.0'
  description: API REST completa para SIGMI Backend - Sistema de gestión de presupuestos, gastos y operaciones financieras
  contact:
    name: Equipo de Desarrollo SIGMI
  license:
    name: MIT

servers:
  - url: http://localhost:3334/api/v2
    description: Servidor de Desarrollo Local
  - url: http://93.127.210.103/api/v2
    description: Servidor de Producción

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT del endpoint de inicio de sesión

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
        title:
          type: string
      required:
        - message
        - title

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        perPage:
          type: integer
        currentPage:
          type: integer
        lastPage:
          type: integer
        hasMorePages:
          type: boolean

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: object
          properties:
            token:
              type: string
            type:
              type: string
              example: Bearer
            expiresIn:
              type: integer
        refreshToken:
          type: string
        userData:
          type: object
          properties:
            id:
              type: integer
            email:
              type: string
            fullName:
              type: string

    LedgerMovement:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        concept:
          type: string
        amount:
          type: number
        absoluteAmount:
          type: number
        type:
          type: string
          enum: [income, expense]
        status:
          type: string
          enum: [paid, pending, voided]
        currencyId:
          type: integer
        documentType:
          type: integer
        documentNumber:
          type: string
        account:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        costCenter:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            code:
              type: string
        client:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        paymentMethod:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        justifications:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [budget_payment, expense]
              id:
                type: integer
              reference:
                type: string
              description:
                type: string
              budgetNumber:
                type: string
              clientName:
                type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BudgetPayment:
      type: object
      properties:
        budgetId:
          type: integer
          description: ID del presupuesto
        accountId:
          type: integer
          description: ID de la cuenta contable
        costCenterId:
          type: integer
          description: ID del centro de costo
        clientId:
          type: integer
          description: ID del cliente
        date:
          type: string
          format: date
          description: Fecha del pago
        amount:
          type: number
          description: Monto del pago (opcional si se calcula desde las líneas)
        currencyId:
          type: integer
          description: ID de la moneda
        paymentMethodId:
          type: integer
          description: ID del método de pago
        documentTypeId:
          type: integer
          description: ID del tipo de documento
        documentNumber:
          type: string
          description: Número de documento. Si se proporciona, el pago se marca como 'pagado' y no proyectado
        concept:
          type: string
          description: Concepto del pago (auto-generado si no se proporciona y budgetId existe)
        status:
          type: string
          enum: [paid, pending, voided]
          description: Estado del pago
        isProjected:
          type: boolean
          description: Marca el pago como proyectado (ignorado si documentNumber está presente)
        receivedAt:
          type: string
          format: date-time
          description: Fecha-hora de recepción
        lines:
          type: array
          description: Líneas de pago que especifican qué items del presupuesto se están pagando
          items:
            $ref: '#/components/schemas/BudgetpaymentDetail'

    BudgetpaymentDetail:
      type: object
      properties:
        bugetProductId:
          type: integer
          nullable: true
          description: ID del producto presupuestal (debe proporcionar esto o bugetItemId)
        bugetItemId:
          type: integer
          nullable: true
          description: ID del item presupuestal (debe proporcionar esto o bugetProductId)
        amount:
          type: number
          nullable: true
          description: Monto pagado para este item
      required:
        - bugetProductId
        - bugetItemId
      description: Una línea de pago que vincula el pago a un item específico del presupuesto

    PaymentMethod:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string

    PaymentDocumentType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string

    LedgingAccount:
      type: object
      properties:
        id:
          type: integer
        businessId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [income, expense]

    Expense:
      type: object
      properties:
        id:
          type: integer
        businessId:
          type: integer
        date:
          type: string
          format: date
        amount:
          type: number
        currencyId:
          type: integer
        description:
          type: string
        status:
          type: string
          enum: [paid, pending, canceled]
        business:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        currency:
          type: object
          properties:
            id:
              type: integer
            symbol:
              type: string
            name:
              type: string

    SaleDetail:
      type: object
      properties:
        id:
          type: integer
        saleId:
          type: integer
        productId:
          type: integer
          nullable: true
        product:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            amount:
              type: number
        lineNumber:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        quantity:
          type: number
        unitAmount:
          type: number
        amount:
          type: number
        taxes:
          type: array
          items:
            $ref: '#/components/schemas/SaleTax'
        metadata:
          type: object
          nullable: true

    SaleTax:
      type: object
      properties:
        code:
          type: string
        rate:
          type: number
          nullable: true
        baseAmount:
          type: number
          nullable: true
        amount:
          type: number
          nullable: true
        total:
          type: number
          nullable: true
        percentage:
          type: number
          nullable: true
        percent:
          type: number
          nullable: true
        isExempt:
          type: boolean
          nullable: true
      required:
        - code

    SalePayment:
      type: object
      properties:
        id:
          type: integer
        saleId:
          type: integer
        coinId:
          type: integer
          nullable: true
        amount:
          type: number
        invoiced:
          type: boolean
        invoiceMeta:
          type: object
          nullable: true
        date:
          type: string
          format: date
        dueDate:
          type: string
          format: date
          nullable: true
        voided:
          type: boolean
        voidedAt:
          type: string
          format: date-time
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
        deletedBy:
          type: integer
          nullable: true
        coin:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            symbol:
              type: string
            name:
              type: string
        ledgerMovement:
          $ref: '#/components/schemas/LedgerMovement'

    Sale:
      type: object
      properties:
        id:
          type: integer
        businessId:
          type: integer
        createdById:
          type: integer
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        saleDate:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [draft, pending, confirmed, canceled]
        totalAmount:
          type: number
          nullable: true
        utility:
          type: number
          nullable: true
        currencyId:
          type: integer
          nullable: true
        metadata:
          type: object
          nullable: true
        banks:
          type: array
          items:
            type: object
        electronicBilling:
          type: object
          nullable: true
        paymentSummary:
          type: object
          properties:
            totalAmount:
              type: number
            paidAmount:
              type: number
            remainingAmount:
              type: number
            paymentCount:
              type: integer
            isPaid:
              type: boolean
        financialSummary:
          type: object
          properties:
            subtotal:
              type: number
            taxTotal:
              type: number
            utilityTotal:
              type: number
            grossTotal:
              type: number
            paymentSummary:
              type: object
              properties:
                totalAmount:
                  type: number
                paidAmount:
                  type: number
                remainingAmount:
                  type: number
                paymentCount:
                  type: integer
                isPaid:
                  type: boolean
        business:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        createdBy:
          type: object
          properties:
            id:
              type: integer
            email:
              type: string
        currency:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            symbol:
              type: string
            name:
              type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/SaleDetail'
        payments:
          type: array
          items:
            $ref: '#/components/schemas/SalePayment'
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CashAuditLine:
      type: object
      properties:
        id:
          type: integer
        cashAuditId:
          type: integer
        currencyId:
          type: integer
          nullable: true
        denominationValue:
          type: number
          nullable: true
        denominationName:
          type: string
          nullable: true
        quantity:
          type: number
          nullable: true
        amount:
          type: number
          nullable: true
        subtotal:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CashAudit:
      type: object
      properties:
        id:
          type: integer
        businessId:
          type: integer
          nullable: true
        performedBy:
          type: integer
          nullable: true
        performedAt:
          type: string
          format: date-time
        totalCounted:
          type: number
        totalExpected:
          type: number
        difference:
          type: number
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lines:
          type: array
          items:
            $ref: '#/components/schemas/CashAuditLine'

paths:
  /account/login:
    post:
      tags:
        - Autenticación
      summary: Inicio de sesión de usuario
      description: Autenticar usuario con correo electrónico y contraseña
      operationId: accountLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
                - email
                - password
            example:
              email: user@example.com
              password: password123
      responses:
        '200':
          description: Inicio de sesión exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security: []

  /balances/movements:
    get:
      tags:
        - Balances
      summary: Listar movimientos contables
      description: Obtener movimientos contables con filtrado y paginación opcionales
      operationId: getBalancesMovements
      parameters:
        - name: page
          in: query
          description: Número de página para la paginación
          schema:
            type: integer
            default: 1
        - name: perPage
          in: query
          description: Registros por página
          schema:
            type: integer
            default: 15
        - name: text
          in: query
          description: Buscar por cliente, cuenta, concepto o número de documento
          schema:
            type: string
        - name: status
          in: query
          description: Filtrar por estado del movimiento
          schema:
            type: string
            enum: [paid, pending, voided]
        - name: documentTypeId
          in: query
          description: Filtrar por tipo de documento de pago
          schema:
            type: integer
        - name: paymentMethodId
          in: query
          description: Filtrar por método de pago
          schema:
            type: integer
        - name: type
          in: query
          description: Filtrar por tipo de movimiento
          schema:
            type: string
            enum: [income, expense]
      responses:
        '200':
          description: Lista de movimientos contables
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LedgerMovement'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
              example:
                message: Movimientos obtenidos exitosamente
                data:
                  - id: 1
                    date: '2026-01-17'
                    concept: Pago cotización #1001
                    amount: 150000
                    absoluteAmount: 150000
                    type: income
                    status: paid
                meta:
                  total: 100
                  perPage: 15
                  currentPage: 1
                  lastPage: 7
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /file/refresh-signed-url:
    get:
      tags:
        - Files
      summary: Generar URL firmada nueva por filepath
      description: Regenera una URL firmada para un objeto almacenado usando su ruta corta en bucket.
      operationId: fileRefreshSignedUrlGet
      parameters:
        - name: filePath
          in: query
          required: true
          description: Ruta interna del archivo en el bucket (por ejemplo clients/abc123.jpg)
          schema:
            type: string
      responses:
        '200':
          description: URL firmada generada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  filePath:
                    type: string
                  message:
                    type: string
                  title:
                    type: string
        '422':
          description: filePath inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error al generar la URL firmada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
    post:
      tags:
        - Files
      summary: Generar URL firmada nueva por filepath
      description: Regenera una URL firmada para un objeto almacenado usando su ruta corta en bucket.
      operationId: fileRefreshSignedUrlPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filePath:
                  type: string
                  description: Ruta interna del archivo en el bucket.
                filepath:
                  type: string
                  description: Alias compatible para filePath.
            examples:
              withFilePath:
                value:
                  filePath: clients/abc123.jpg
              withFilepathAlias:
                value:
                  filepath: products/def456.webp
      responses:
        '200':
          description: URL firmada generada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  filePath:
                    type: string
                  message:
                    type: string
                  title:
                    type: string
        '422':
          description: filePath inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error al generar la URL firmada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /config/payment-methods:
    get:
      tags:
        - Configuración
      summary: Listar métodos de pago
      description: Obtener todos los métodos de pago con paginación
      operationId: listPaymentMethods
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: perPage
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Lista de métodos de pago
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
      security:
        - bearerAuth: []

  /config/payment-methods/store:
    post:
      tags:
        - Configuración
      summary: Crear método de pago
      description: Crear un nuevo método de pago
      operationId: storePaymentMethod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
              required:
                - name
            example:
              name: Transferencia
              description: Pago por transferencia bancaria
      responses:
        '201':
          description: Método de pago creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '500':
          description: Error de creación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /config/payment-methods/show/{id}:
    get:
      tags:
        - Configuración
      summary: Obtener método de pago
      description: Obtener un método de pago específico
      operationId: showPaymentMethod
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detalles del método de pago
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /config/payment-methods/update/{id}:
    put:
      tags:
        - Configuración
      summary: Actualizar método de pago
      description: Actualizar un método de pago existente
      operationId: updatePaymentMethod
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
            example:
              name: Transferencia Bancaria
              description: Pago por transferencia
      responses:
        '200':
          description: Método de pago actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '500':
          description: Error de actualización
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /config/payment-methods/delete/{id}:
    delete:
      tags:
        - Configuración
      summary: Eliminar método de pago
      description: Eliminar un método de pago
      operationId: deletePaymentMethod
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Método de pago eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error al eliminar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /config/payment-methods/select:
    get:
      tags:
        - Configuración
      summary: Lista de selección de métodos de pago
      description: Obtener métodos de pago para dropdown/select
      operationId: selectPaymentMethods
      responses:
        '200':
          description: Lista de métodos de pago
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentMethod'
      security:
        - bearerAuth: []

  /config/payment-document-types:
    get:
      tags:
        - Configuración
      summary: Listar tipos de documento de pago
      description: Obtener todos los tipos de documento de pago con paginación
      operationId: listPaymentDocumentTypes
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: perPage
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Lista de tipos de documento de pago
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentDocumentType'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
      security:
        - bearerAuth: []

  /config/payment-document-types/store:
    post:
      tags:
        - Configuración
      summary: Crear tipo de documento de pago
      description: Crear un nuevo tipo de documento de pago
      operationId: storePaymentDocumentType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
              required:
                - name
            example:
              name: Factura
              description: Factura comercial
      responses:
        '201':
          description: Tipo de documento creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentDocumentType'
        '500':
          description: Error de creación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /config/payment-document-types/show/{id}:
    get:
      tags:
        - Configuración
      summary: Obtener tipo de documento de pago
      description: Obtener un tipo de documento de pago específico
      operationId: showPaymentDocumentType
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detalles del tipo de documento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentDocumentType'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /config/payment-document-types/update/{id}:
    put:
      tags:
        - Configuración
      summary: Actualizar tipo de documento de pago
      description: Actualizar un tipo de documento de pago existente
      operationId: updatePaymentDocumentType
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
            example:
              name: Factura Electrónica
              description: Factura electrónica
      responses:
        '200':
          description: Tipo de documento actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentDocumentType'
        '500':
          description: Error de actualización
